version: '3.8'

services:
  telegram-bot:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - PORT=3000
      - NODE_ENV=production
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - FLUX_MICROSERVICE_URL=http://flux-generator:8000
    depends_on:
      - flux-generator
    ports:
      - "3000:3000"
    restart: always

  flux-generator:
    build:
      context: ./microservices/flux-generator
      dockerfile: Dockerfile
    environment:
      - FLUX_MODEL_PATH=${FLUX_MODEL_PATH}
    ports:
      - "8000:8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: always
